<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Everlume Form Blueprint</title>
</head>
<body>
  <form name="research-inquiry" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="research-inquiry">
    <input name="bot-field">
    <input name="name">
    <input name="organization">
    <input type="email" name="email">
    <input name="product">
    <textarea name="message"></textarea>
    <input type="checkbox" name="research-use-acknowledgment" value="accepted">
    <button type="submit">Submit</button>
  </form>
</body>
</html>
